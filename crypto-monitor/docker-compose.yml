version: "3.9"

networks:
  crypto-net:
    driver: bridge

volumes:
  mongo_data:

services:

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    networks: [crypto-net]
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    hostname: mongodb
    networks: [crypto-net]
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-crypto_monitor}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  producer:
    build: ./producer
    container_name: producer
    networks: [crypto-net]
    depends_on:
      kafka:   { condition: service_healthy }
      mongodb: { condition: service_healthy }
    env_file: .env
    restart: on-failure

  consumer1:
    build: ./consumer1_storage
    container_name: consumer1
    networks: [crypto-net]
    depends_on:
      kafka:   { condition: service_healthy }
      mongodb: { condition: service_healthy }
    env_file: .env
    restart: on-failure

  consumer2:
    build: ./consumer2_aggregator
    container_name: consumer2
    networks: [crypto-net]
    depends_on:
      kafka:   { condition: service_healthy }
      mongodb: { condition: service_healthy }
    env_file: .env
    restart: on-failure

  consumer3:
    build: ./consumer3_anomaly
    container_name: consumer3
    networks: [crypto-net]
    depends_on:
      kafka:   { condition: service_healthy }
      mongodb: { condition: service_healthy }
    env_file: .env
    restart: on-failure

  api:
    build: ./api
    container_name: api
    networks: [crypto-net]
    depends_on:
      mongodb: { condition: service_healthy }
    env_file: .env
    ports: ["8000:8000"]
    restart: on-failure

  dashboard:
    image: nginx:alpine
    container_name: dashboard
    networks: [crypto-net]
    depends_on: [api]
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["3000:80"]
    restart: on-failure
